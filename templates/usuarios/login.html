{% extends "base.html" %}

{% block title %}Iniciar Sesión{% endblock %}

{% block content %}
<div class="row justify-content-center fade-in-up">
    <div class="col-lg-5 col-md-7 col-10">
        <div class="card-dark">
            <div class="text-center mb-4">
                <i class="fas fa-dumbbell" style="font-size: 3rem; color: #ff6b00;"></i>
                <h2 class="mt-3 fw-bold" style="color: #ffffff;">Iniciar Sesión</h2>
                <p style="color: #aaaaaa;">Ingresa a tu cuenta</p>
            </div>
            
            <form method="POST" action="{{ url_for('usuarios.login') }}">
                <div class="mb-3">
                    <label class="form-label" style="color: #ffffff;">Correo Electrónico</label>
                    <div class="input-group-icon">
                        <i class="fas fa-envelope"></i>
                        <input type="email" 
                               class="input-dark" 
                               name="correo" 
                               placeholder="tucorreo@ejemplo.com" 
                               required 
                               autofocus>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label class="form-label" style="color: #ffffff;">Contraseña</label>
                    <div class="input-group-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" 
                               class="input-dark" 
                               name="password" 
                               placeholder="••••••••" 
                               required>
                    </div>
                </div>
                
                <button type="submit" class="btn-iron">
                    <i class="fas fa-sign-in-alt me-2"></i> Ingresar
                </button>
            </form>
            
            <div class="text-center mt-4">
                <p style="color: #aaaaaa;">
                    ¿No tienes cuenta? 
                    <a href="{{ url_for('usuarios.registro') }}" class="link-iron">
                        Crear cuenta
                    </a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
