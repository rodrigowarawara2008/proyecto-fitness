{% extends "base.html" %}

{% block title %}Registrarse{% endblock %}

{% block content %}
<div class="row justify-content-center fade-in-up">
    <div class="col-lg-6 col-md-8 col-10">
        <div class="card-dark">
            <div class="text-center mb-4">
                <i class="fas fa-user-plus" style="font-size: 3rem; color: #ff6b00;"></i>
                <h2 class="mt-3 fw-bold" style="color: #ffffff;">Crear Cuenta</h2>
                <p style="color: #aaaaaa;">Únete a IRON BEAST</p>
            </div>
            
            <form method="POST" action="{{ url_for('usuarios.registro') }}">
                <div class="mb-3">
                    <label class="form-label" style="color: #ffffff;">Nombre Completo</label>
                    <div class="input-group-icon">
                        <i class="fas fa-user"></i>
                        <input type="text" 
                               class="input-dark" 
                               name="nombre" 
                               placeholder="Tu nombre" 
                               required 
                               autofocus>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label class="form-label" style="color: #ffffff;">Correo Electrónico</label>
                    <div class="input-group-icon">
                        <i class="fas fa-envelope"></i>
                        <input type="email" 
                               class="input-dark" 
                               name="correo" 
                               placeholder="tucorreo@ejemplo.com" 
                               required>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label class="form-label" style="color: #ffffff;">Contraseña</label>
                    <div class="input-group-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" 
                               class="input-dark" 
                               name="password" 
                               placeholder="Mínimo 6 caracteres" 
                               required 
                               minlength="6">
                    </div>
                </div>
                
                <div class="mb-3">
                    <label class="form-label" style="color: #ffffff;">Confirmar Contraseña</label>
                    <div class="input-group-icon">
                        <i class="fas fa-check-circle"></i>
                        <input type="password" 
                               class="input-dark" 
                               name="confirm_password" 
                               placeholder="Repite tu contraseña" 
                               required>
                    </div>
                </div>
                
                <button type="submit" class="btn-iron">
                    <i class="fas fa-user-plus me-2"></i> Crear Cuenta
                </button>
            </form>
            
            <div class="text-center mt-4">
                <p style="color: #aaaaaa;">
                    ¿Ya tienes cuenta? 
                    <a href="{{ url_for('usuarios.login') }}" class="link-iron">
                        Inicia sesión aquí
                    </a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
